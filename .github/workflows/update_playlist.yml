name: 🔄 M3U8 Playlist Güncelle

on:
  schedule:
    - cron: '0 */6 * * *'
  
  workflow_dispatch:
    inputs:
      force_update:
        description: 'Zorla güncelle'
        required: false
        default: 'false'
        type: boolean

  push:
    branches:
      - main
    paths:
      - 'scraper.py'
      - 'requirements.txt'

jobs:
  scrape:
    name: 📺 M3U8 Tara & Güncelle
    runs-on: ubuntu-22.04  # ← 22.04 kullan (24.04 değil)

    permissions:
      contents: write

    steps:
      # ── 1. Checkout ─────────────────────────────────
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # ── 2. Python ───────────────────────────────────
      - name: 🐍 Python 3.11 Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. Sistem Paketleri ─────────────────────────
      - name: 🔧 Sistem Paketleri Kur
        run: |
          sudo apt-get update -qq

          # Ubuntu versiyonunu kontrol et
          UBUNTU_VERSION=$(lsb_release -rs)
          echo "Ubuntu Versiyonu: $UBUNTU_VERSION"

          # Temel paketler (tüm versiyonlarda çalışır)
          sudo apt-get install -y \
            wget \
            curl \
            unzip \
            xvfb \
            ca-certificates \
            gnupg \
            --no-install-recommends

          # Versiyon bazlı paketler
          if [[ "$UBUNTU_VERSION" == "24.04" ]]; then
            echo "Ubuntu 24.04 paketleri kuruluyor..."
            sudo apt-get install -y \
              libasound2t64 \
              libatk-bridge2.0-0t64 \
              libatk1.0-0t64 \
              libcairo2 \
              libcups2t64 \
              libdbus-1-3 \
              libdrm2 \
              libgbm1 \
              libglib2.0-0t64 \
              libgtk-3-0t64 \
              libnspr4 \
              libnss3 \
              libpango-1.0-0 \
              libx11-6 \
              libxcb1 \
              libxcomposite1 \
              libxdamage1 \
              libxext6 \
              libxfixes3 \
              libxkbcommon0 \
              libxrandr2 \
              libxss1 \
              fonts-liberation \
              xdg-utils \
              --no-install-recommends
          else
            echo "Ubuntu 22.04 paketleri kuruluyor..."
            sudo apt-get install -y \
              libasound2 \
              libatk-bridge2.0-0 \
              libatk1.0-0 \
              libcairo2 \
              libcups2 \
              libdbus-1-3 \
              libdrm2 \
              libgbm1 \
              libglib2.0-0 \
              libgtk-3-0 \
              libnspr4 \
              libnss3 \
              libpango-1.0-0 \
              libx11-6 \
              libxcb1 \
              libxcomposite1 \
              libxdamage1 \
              libxext6 \
              libxfixes3 \
              libxkbcommon0 \
              libxrandr2 \
              libxss1 \
              fonts-liberation \
              xdg-utils \
              --no-install-recommends
          fi

          echo "✅ Sistem paketleri kuruldu"

      # ── 4. Chrome Kur ────────────────────────────────
      - name: 🌐 Google Chrome Kur
        run: |
          # Google Chrome repo ekle
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub \
            | sudo gpg --dearmor -o /usr/share/keyrings/google-chrome.gpg

          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome.gpg] \
            http://dl.google.com/linux/chrome/deb/ stable main" \
            | sudo tee /etc/apt/sources.list.d/google-chrome.list

          sudo apt-get update -qq
          sudo apt-get install -y google-chrome-stable

          # Versiyonu kontrol et
          CHROME_VER=$(google-chrome --version)
          echo "✅ $CHROME_VER"
          echo "CHROME_VERSION=$(google-chrome --version | grep -oP '\d+\.\d+\.\d+\.\d+')" >> $GITHUB_ENV

      # ── 5. ChromeDriver Kur ──────────────────────────
      - name: 🔧 ChromeDriver Kur
        run: |
          CHROME_MAJOR=$(echo "${{ env.CHROME_VERSION }}" | cut -d. -f1)
          echo "Chrome Major: $CHROME_MAJOR"

          if [ "$CHROME_MAJOR" -ge 115 ]; then
            echo "Yeni ChromeDriver indiriliyor (115+)..."

            # En son stable driver URL'ini al
            DRIVER_JSON=$(curl -s \
              "https://googlechromelabs.github.io/chrome-for-testing/last-known-good-versions-with-downloads.json")

            DRIVER_URL=$(echo "$DRIVER_JSON" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          downloads = data['channels']['Stable']['downloads']['chromedriver']
          for item in downloads:
              if item['platform'] == 'linux64':
                  print(item['url'])
                  break
          ")
            echo "Driver URL: $DRIVER_URL"
            wget -q "$DRIVER_URL" -O chromedriver.zip
            unzip -q chromedriver.zip -d chromedriver_tmp
            sudo find chromedriver_tmp -name "chromedriver" -type f \
              -exec mv {} /usr/local/bin/chromedriver \;
            rm -rf chromedriver_tmp chromedriver.zip

          else
            echo "Eski ChromeDriver indiriliyor..."
            DRIVER_VER=$(curl -s \
              "https://chromedriver.storage.googleapis.com/LATEST_RELEASE_${CHROME_MAJOR}")
            wget -q \
              "https://chromedriver.storage.googleapis.com/${DRIVER_VER}/chromedriver_linux64.zip" \
              -O chromedriver.zip
            unzip -q chromedriver.zip
            sudo mv chromedriver /usr/local/bin/chromedriver
            rm chromedriver.zip
          fi

          sudo chmod +x /usr/local/bin/chromedriver
          echo "✅ $(chromedriver --version)"

      # ── 6. Python Paketleri ──────────────────────────
      - name: 📦 Python Paketleri Yükle
        run: |
          python -m pip install --upgrade pip setuptools wheel

          pip install \
            selenium==4.16.0 \
            selenium-wire==5.1.0 \
            webdriver-manager==4.0.1 \
            beautifulsoup4==4.12.2 \
            requests==2.31.0 \
            lxml==4.9.3 \
            blinker==1.7.0 \
            pyOpenSSL==23.3.0 \
            urllib3==1.26.18

          echo "✅ Python paketleri kuruldu"
          pip list

      # ── 7. Virtual Display ───────────────────────────
      - name: 🖥️ Virtual Display Başlat
        run: |
          Xvfb :99 -screen 0 1920x1080x24 -ac +extension GLX +render -noreset &
          sleep 3
          echo "DISPLAY=:99" >> $GITHUB_ENV
          echo "✅ Virtual display başlatıldı"

      # ── 8. Chrome Test ───────────────────────────────
      - name: 🧪 Chrome Test Et
        env:
          DISPLAY: ':99'
        run: |
          python3 -c "
          from selenium import webdriver
          from selenium.webdriver.chrome.options import Options
          from selenium.webdriver.chrome.service import Service

          opts = Options()
          opts.add_argument('--headless=new')
          opts.add_argument('--no-sandbox')
          opts.add_argument('--disable-dev-shm-usage')
          opts.add_argument('--disable-gpu')

          driver = webdriver.Chrome(options=opts)
          driver.get('https://www.google.com')
          print(f'✅ Chrome çalışıyor: {driver.title}')
          driver.quit()
          "

      # ── 9. Scraper Çalıştır ──────────────────────────
      - name: 🔍 Scraper Çalıştır
        env:
          TARGET_URL: ${{ secrets.TARGET_URL }}
          DISPLAY: ':99'
          PYTHONUNBUFFERED: '1'
        run: |
          echo "🚀 Scraper başlatılıyor..."
          python scraper.py
        timeout-minutes: 30

      # ── 10. Sonuç Kontrol ────────────────────────────
      - name: 📊 Sonuç Kontrol
        run: |
          if [ -f "playlist.m3u" ]; then
            COUNT=$(grep -c "#EXTINF" playlist.m3u 2>/dev/null || echo "0")
            echo "✅ Kanal sayısı: $COUNT"
            echo "CHANNEL_COUNT=$COUNT" >> $GITHUB_ENV
            cat playlist.m3u
          else
            echo "❌ playlist.m3u bulunamadı!"
            exit 1
          fi

      # ── 11. Artifact Yükle ───────────────────────────
      - name: 📦 Logları Yükle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_number }}
          path: |
            logs/
            *.log
            *.png
          retention-days: 5

      # ── 12. Git Push ─────────────────────────────────
      - name: ⚙️ Git Ayarla
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"

      - name: 💾 Commit & Push
        run: |
          git add playlist.m3u stats.json logs/ 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "ℹ️ Değişiklik yok, commit yapılmadı"
          else
            git commit -m "🔄 ${{ env.CHANNEL_COUNT }} kanal | $(date '+%Y-%m-%d %H:%M UTC')"
            git push
            echo "✅ Push başarılı!"
          fi

      # ── 13. Özet ─────────────────────────────────────
      - name: 📋 Özet
        if: always()
        run: |
          RAW="https://raw.githubusercontent.com/${{ github.repository }}/main/playlist.m3u"
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## 📺 Playlist Güncelleme Raporu
          | Alan     | Değer |
          |----------|-------|
          | 📅 Tarih | $(date '+%Y-%m-%d %H:%M UTC') |
          | 📺 Kanal | ${{ env.CHANNEL_COUNT }} |
          | ✅ Durum | ${{ job.status }} |

          ### 📥 Playlist URL
          \`\`\`
          ${RAW}
          \`\`\`
          EOF
