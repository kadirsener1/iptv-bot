name: 🔄 M3U8 Playlist Güncelle

on:
  # Her 6 saatte bir çalış
  schedule:
    - cron: '0 */6 * * *'
  
  # Manuel tetikleme
  workflow_dispatch:
    inputs:
      force_update:
        description: 'Zorla güncelle'
        required: false
        default: 'false'
        type: boolean

  # Push olunca da çalış
  push:
    branches:
      - main
    paths:
      - 'scraper.py'

jobs:
  update-playlist:
    name: 📺 Playlist Güncelle
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      # ── Repo'yu klonla ──────────────────────────────
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # ── Python kur ──────────────────────────────────
      - name: 🐍 Python Kur (3.11)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── Bağımlılıkları yükle ────────────────────────
      - name: 📦 Bağımlılıkları Yükle
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── Scraper'ı çalıştır ──────────────────────────
      - name: 🔍 M3U8 Linklerini Çek
        env:
          TARGET_URL: ${{ secrets.TARGET_URL }}
          GITHUB_TOKEN_CUSTOM: ${{ secrets.PAT_TOKEN }}
        run: |
          python scraper.py
        continue-on-error: false

      # ── Sonuçları kontrol et ────────────────────────
      - name: 📊 Sonuçları Kontrol Et
        run: |
          if [ -f "playlist.m3u" ]; then
            COUNT=$(grep -c "#EXTINF" playlist.m3u || echo 0)
            echo "✅ Toplam kanal sayısı: $COUNT"
            echo "CHANNEL_COUNT=$COUNT" >> $GITHUB_ENV
            
            echo "--- İlk 20 satır ---"
            head -20 playlist.m3u
          else
            echo "❌ playlist.m3u bulunamadı!"
            exit 1
          fi

      # ── Değişiklik var mı kontrol et ────────────────
      - name: 🔎 Değişiklik Kontrolü
        id: check_changes
        run: |
          git diff --quiet playlist.m3u || echo "CHANGED=true" >> $GITHUB_ENV
          git status

      # ── Git ayarla ──────────────────────────────────
      - name: ⚙️ Git Ayarla
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions Bot"

      # ── Commit & Push ────────────────────────────────
      - name: 💾 Commit & Push
        if: env.CHANGED == 'true' || github.event.inputs.force_update == 'true'
        run: |
          git add playlist.m3u
          git add logs/ || true
          
          TIMESTAMP=$(date '+%Y-%m-%d %H:%M:%S UTC')
          COUNT=${{ env.CHANNEL_COUNT }}
          
          git commit -m "🔄 Playlist güncellendi | $COUNT kanal | $TIMESTAMP"
          git push

      # ── Değişiklik yoksa bildir ─────────────────────
      - name: ℹ️ Değişiklik Yok
        if: env.CHANGED != 'true' && github.event.inputs.force_update != 'true'
        run: |
          echo "ℹ️ Playlist değişmedi, commit yapılmadı"

      # ── Özet oluştur ────────────────────────────────
      - name: 📋 İş Özeti
        if: always()
        run: |
          echo "## 📺 M3U8 Playlist Güncelleme Raporu" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Alan | Değer |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 📅 Tarih | $(date '+%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "| 📺 Kanal Sayısı | ${{ env.CHANNEL_COUNT }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔄 Değişiklik | ${{ env.CHANGED == 'true' && '✅ Evet' || '❌ Hayır' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🌐 Kaynak | ${{ secrets.TARGET_URL }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📥 Raw Playlist URL" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "https://raw.githubusercontent.com/${{ github.repository }}/main/playlist.m3u" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  # ── Bildirim Job'u ────────────────────────────────────
  notify:
    name: 📨 Bildirim Gönder
    runs-on: ubuntu-latest
    needs: update-playlist
    if: always()
    
    steps:
      - name: ✅ Başarı Bildirimi
        if: needs.update-playlist.result == 'success'
        run: |
          echo "✅ Playlist başarıyla güncellendi!"
          # Telegram bildirimi eklemek istersen:
          # curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          #   -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          #   -d text="✅ M3U8 Playlist güncellendi! Kanal: ${{ env.CHANNEL_COUNT }}"

      - name: ❌ Hata Bildirimi
        if: needs.update-playlist.result == 'failure'
        run: |
          echo "❌ Playlist güncellenemedi!"
