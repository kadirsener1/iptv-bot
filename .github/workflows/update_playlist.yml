name: 🔄 M3U8 Playlist Güncelle

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'scraper.py'

jobs:
  scrape:
    name: 📺 M3U8 Tara
    runs-on: ubuntu-22.04

    permissions:
      contents: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 🔧 Sistem Paketleri
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            wget curl unzip xvfb \
            libasound2 \
            libatk-bridge2.0-0 \
            libatk1.0-0 \
            libcairo2 \
            libcups2 \
            libdbus-1-3 \
            libdrm2 \
            libgbm1 \
            libglib2.0-0 \
            libgtk-3-0 \
            libnspr4 \
            libnss3 \
            libpango-1.0-0 \
            libx11-6 \
            libxcb1 \
            libxcomposite1 \
            libxdamage1 \
            libxext6 \
            libxfixes3 \
            libxkbcommon0 \
            libxrandr2 \
            libxss1 \
            fonts-liberation \
            xdg-utils \
            --no-install-recommends
          echo "✅ Sistem paketleri tamam"

      - name: 🌐 Chrome & ChromeDriver Kur
        run: |
          LATEST=$(curl -s \
            "https://googlechromelabs.github.io/chrome-for-testing/last-known-good-versions-with-downloads.json")

          CHROME_URL=$(echo "$LATEST" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for item in data['channels']['Stable']['downloads']['chrome']:
              if item['platform'] == 'linux64':
                  print(item['url'])
                  break
          ")

          DRIVER_URL=$(echo "$LATEST" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for item in data['channels']['Stable']['downloads']['chromedriver']:
              if item['platform'] == 'linux64':
                  print(item['url'])
                  break
          ")

          wget -q "$CHROME_URL" -O chrome-linux64.zip
          unzip -q chrome-linux64.zip -d chrome_tmp
          sudo mv chrome_tmp/chrome-linux64 /opt/chrome
          sudo ln -sf /opt/chrome/chrome /usr/local/bin/google-chrome
          sudo chmod +x /opt/chrome/chrome
          rm -rf chrome_tmp chrome-linux64.zip

          wget -q "$DRIVER_URL" -O chromedriver-linux64.zip
          unzip -q chromedriver-linux64.zip -d driver_tmp
          DRIVER_BIN=$(find driver_tmp -name "chromedriver" -type f | head -1)
          sudo cp "$DRIVER_BIN" /usr/local/bin/chromedriver
          sudo chmod +x /usr/local/bin/chromedriver
          rm -rf driver_tmp chromedriver-linux64.zip

          echo "✅ Chrome: $(google-chrome --version)"
          echo "✅ Driver: $(chromedriver --version)"

      - name: 📦 Python Paketleri
        run: |
          pip install --upgrade pip
          pip install \
            selenium==4.16.0 \
            selenium-wire==5.1.0 \
            beautifulsoup4==4.12.2 \
            requests==2.31.0 \
            lxml==4.9.3 \
            blinker==1.7.0 \
            pyOpenSSL==23.3.0 \
            urllib3==1.26.18
          echo "✅ Python paketleri tamam"

      - name: 🖥️ Virtual Display
        run: |
          Xvfb :99 -screen 0 1920x1080x24 -ac +render -noreset &
          sleep 2
          echo "DISPLAY=:99" >> $GITHUB_ENV
          echo "✅ Display başlatıldı"

      - name: 🧪 Chrome Test
        env:
          DISPLAY: ':99'
        run: |
          python3 << 'EOF'
          from selenium import webdriver
          from selenium.webdriver.chrome.options import Options
          from selenium.webdriver.chrome.service import Service

          opts = Options()
          opts.add_argument("--headless=new")
          opts.add_argument("--no-sandbox")
          opts.add_argument("--disable-dev-shm-usage")
          opts.add_argument("--disable-gpu")
          opts.binary_location = "/usr/local/bin/google-chrome"

          service = Service(executable_path="/usr/local/bin/chromedriver")
          driver  = webdriver.Chrome(service=service, options=opts)
          driver.get("https://www.google.com")
          print(f"✅ Chrome test OK: {driver.title}")
          driver.quit()
          EOF

      # ── URL Kontrol ──────────────────────────────────
      - name: 🔎 URL Kontrol
        run: |
          # Secret geldi mi?
          if [ -z "${{ secrets.TARGET_URL }}" ]; then
            echo "⚠️ TARGET_URL Secret boş!"
            echo "✅ Varsayılan URL kullanılacak"
            echo "FINAL_URL=https://atomsportv494.top" >> $GITHUB_ENV
          else
            echo "✅ TARGET_URL Secret mevcut"
            echo "FINAL_URL=${{ secrets.TARGET_URL }}" >> $GITHUB_ENV
          fi

      - name: 🔍 Scraper Çalıştır
        env:
          TARGET_URL: ${{ env.FINAL_URL }}
          DISPLAY: ':99'
          CHROMEDRIVER_PATH: '/usr/local/bin/chromedriver'
          CHROME_BIN: '/usr/local/bin/google-chrome'
          PYTHONUNBUFFERED: '1'
        run: |
          echo "🎯 Hedef URL: $TARGET_URL"
          
          # Son güvenlik kontrolü
          if [ -z "$TARGET_URL" ]; then
            export TARGET_URL="https://atomsportv494.top"
            echo "⚠️ URL boş geldi, varsayılan kullanılıyor: $TARGET_URL"
          fi
          
          python scraper.py
        timeout-minutes: 30

      - name: 📊 Sonuç Kontrol
        run: |
          if [ -f "playlist.m3u" ]; then
            COUNT=$(grep -c "#EXTINF" playlist.m3u || true)
            if ! [[ "$COUNT" =~ ^[0-9]+$ ]]; then
              COUNT=0
            fi
            echo "📺 Kanal: $COUNT"
            echo "CHANNEL_COUNT=${COUNT}" >> $GITHUB_ENV
            cat playlist.m3u
          else
            echo "❌ playlist.m3u yok!"
            echo "CHANNEL_COUNT=0" >> $GITHUB_ENV
          fi

      - name: 📦 Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-${{ github.run_number }}
          path: |
            logs/
            *.log
            *.png
            *.html
          retention-days: 7

      - name: ⚙️ Git Ayarla
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"

      - name: 💾 Commit & Push
        run: |
          git add playlist.m3u stats.json logs/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "ℹ️ Değişiklik yok"
          else
            COUNT="${{ env.CHANNEL_COUNT }}"
            git commit -m "🔄 ${COUNT} kanal | $(date '+%Y-%m-%d %H:%M UTC')"
            git push
            echo "✅ Push tamam"
          fi

      - name: 📋 Özet
        if: always()
        run: |
          COUNT="${{ env.CHANNEL_COUNT }}"
          RAW="https://raw.githubusercontent.com/${{ github.repository }}/main/playlist.m3u"
          {
            echo "## 📺 Playlist Raporu"
            echo "| Alan | Değer |"
            echo "|------|-------|"
            echo "| 📅 Tarih | $(date '+%Y-%m-%d %H:%M UTC') |"
            echo "| 🎯 URL | ${{ env.FINAL_URL }} |"
            echo "| 📺 Kanal | ${COUNT} |"
            echo "| ✅ Durum | ${{ job.status }} |"
            echo ""
            echo "### 📥 Playlist URL"
            echo '```'
            echo "${RAW}"
            echo '```'
          } >> $GITHUB_STEP_SUMMARY
