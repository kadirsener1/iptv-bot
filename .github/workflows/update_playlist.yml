name: M3U Auto Update

on:
  schedule:
    - cron: "0 * * * *"   # ⏰ Her 1 saat
  workflow_dispatch:       # Elle çalıştırma

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Repo çek
        uses: actions/checkout@v3

      - name: Python kur
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Chrome kur
        uses: browser-actions/setup-chrome@v1

      - name: ChromeDriver kur
        uses: nanasess/setup-chromedriver@v2

      - name: Gereksinimleri yükle
        run: |
          pip install selenium selenium-wire requests

      - name: Script çalıştır
        run: python scraper.py

      - name: Değişiklikleri commit et
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Auto update M3U" || echo "No changes"
          git push
